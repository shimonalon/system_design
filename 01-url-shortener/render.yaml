services:
  # Backend API
  - type: web
    name: url-shortener-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: url-shortener-redis
          type: redis
          property: connectionString
      - key: BASE_URL
        sync: false   # Set manually in Render dashboard
      - key: DEBUG
        value: "False"
      - key: CACHE_TTL
        value: "86400"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"

databases:
  # PostgreSQL
  - name: url-shortener-db
    databaseName: url_shortener
    user: url_shortener_user
    plan: free

  # Redis (Render does not support Redis in Blueprints on free plan)
  # You'll need to create Redis manually:
  # 1. Go to Render Dashboard → New → Redis
  # 2. Copy the Internal URL
  # 3. Set REDIS_URL in your web service environment
